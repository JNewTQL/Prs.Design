<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRS — Edit User</title>
    <link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div class="d-flex justify-content-between pb-3 mb-4 border-bottom border-2">
          <h2>Edit User</h2>
        </div>
        <form class="d-flex flex-column w-50 gap-3">
          <div class="d-flex flex-row gap-4">
            <div class="w-50">
              <label class="form-label" for="firstName">First Name</label>
              <input id="firstName" class="form-control" type="text" value="Hope" />
            </div>
            <div class="w-50">
              <label class="form-label" for="lastName">Last Name</label>
              <input id="lastName" class="form-control" type="text" value="Hodkiewicz" />
            </div>
          </div>
          <div class="d-flex flex-row gap-4">
            <div class="w-50">
              <label class="form-label" for="email">Email</label>
              <input id="email" class="form-control" type="email" value="hope.hodkiewicz28@example.com" />
            </div>
            <div class="w-50">
              <label class="form-label" for="phone">Phone</label>
              <input id="phone" class="form-control" type="text" value="5277539263" />
            </div>
          </div>

          <div class="d-flex flex-row gap-4">
            <div class="w-50">
              <label class="form-label" for="username">Username</label>
              <input id="username" class="form-control" type="text" value="hope.hodkiewicz28" />
            </div>
            <div class="w-50">
              <label class="form-label" for="password">Password</label>
              <input id="password" class="form-control" type="password" value="password123" />
            </div>
          </div>

          <div class="w-100 d-flex flex-column gap-2">
            <label class="form-label mb-0">Role</label>
            <div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="isReviewer" checked />
                <label class="form-check-label" for="isReviewer">Reviewer</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="isAdmin" checked />
                <label class="form-check-label" for="isAdmin">Admin</label>
              </div>
            </div>
          </div>

          <div class="d-flex justify-content-end w-100 gap-2 mt-3">
            <a href="/users.html" class="btn btn-outline-primary">Cancel</a>
            <button type="submit" class="btn btn-primary d-flex align-items-center">
              <svg class="bi pe-none me-2" width="16" height="16" fill="#FFFFFF">
                <use href="/assets/bootstrap-icons.svg#save" />
              </svg>
              Save user
            </button>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
