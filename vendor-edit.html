<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRS — Edit Vendor</title>
    <link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div class="d-flex justify-content-between pb-3 mb-4 border-bottom border-2">
          <h2>Edit Vendor</h2>
        </div>
        <form class="d-flex flex-column w-50 gap-3">
          <div class="d-flex flex-row gap-4">
            <div class="w-25">
              <label class="form-label" for="vendorCode">Vendor Code</label>
              <input id="vendorCode" class="form-control" type="text" value="BAIL-EY" />
            </div>
            <div class="w-75">
              <label class="form-label" for="vendorName">Vendor Name</label>
              <input id="vendorName" class="form-control" type="text" value="Bailey, Baumbach and Senger" />
            </div>
          </div>
          <div class="d-flex flex-row gap-4">
            <div class="w-100">
              <label class="form-label" for="address">Address</label>
              <input id="address" class="form-control" type="text" value="3293 State Street" />
            </div>
          </div>
          <div class="d-flex flex-row gap-4">
            <div class="w-50">
              <label class="form-label" for="city">City</label>
              <input id="city" class="form-control" type="text" value="Considinetown" />
            </div>
            <div class="w-25">
              <label for="status" class="form-label">Status</label>
              <select id="state" class="form-select">
                <option value="">Select a State</option>
                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="HI">Hawaii</option>
                <option value="ID">Idaho</option>
                <option value="IL">Illinois</option>
                <option value="IN">Indiana</option>
                <option value="IA">Iowa</option>
                <option value="KS">Kansas</option>
                <option value="KY">Kentucky</option>
                <option value="LA">Louisiana</option>
                <option value="ME" selected>Maine</option>
                <option value="MD">Maryland</option>
                <option value="MA">Massachusetts</option>
                <option value="MI">Michigan</option>
                <option value="MN">Minnesota</option>
                <option value="MS">Mississippi</option>
                <option value="MO">Missouri</option>
                <option value="MT">Montana</option>
                <option value="NE">Nebraska</option>
                <option value="NV">Nevada</option>
                <option value="NH">New Hampshire</option>
                <option value="NJ">New Jersey</option>
                <option value="NM">New Mexico</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="ND">North Dakota</option>
                <option value="OH">Ohio</option>
                <option value="OK">Oklahoma</option>
                <option value="OR">Oregon</option>
                <option value="PA">Pennsylvania</option>
                <option value="RI">Rhode Island</option>
                <option value="SC">South Carolina</option>
                <option value="SD">South Dakota</option>
                <option value="TN">Tennessee</option>
                <option value="TX">Texas</option>
                <option value="UT">Utah</option>
                <option value="VT">Vermont</option>
                <option value="VA">Virginia</option>
                <option value="WA">Washington</option>
                <option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option>
                <option value="WY">Wyoming</option>
              </select>
            </div>
            <div class="w-25">
              <label class="form-label" for="zip">ZIP</label>
              <input id="zip" class="form-control" type="text" value="16819" />
            </div>
          </div>

          <div class="d-flex flex-row gap-4">
            <div class="w-50">
              <label class="form-label" for="phone">Phone</label>
              <input id="phone" class="form-control" type="number" value="2293729117" />
            </div>
            <div class="w-50">
              <label class="form-label" for="email">Email</label>
              <input
                id="email"
                class="form-control"
                type="email"
                value="support@BAIL-EY.com
"
              />
            </div>
          </div>

          <div class="d-flex justify-content-end w-100 gap-2 mt-3">
            <a href="/staff.html" class="btn btn-outline-primary">Cancel</a>
            <button type="submit" class="btn btn-primary d-flex align-items-center">
              <svg class="bi pe-none me-2" width="16" height="16" fill="#FFFFFF">
                <use href="/assets/bootstrap-icons.svg#save" />
              </svg>
              Save vendor
            </button>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
